<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WealthTracker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100dvh;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Segoe UI", sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px;
            overflow: hidden;
        }

        /* Radial glow — mirrors the SwiftUI owlGlow layer */
        body::before {
            content: "";
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(212, 165, 116, 0.16) 0%,
                    rgba(212, 165, 116, 0) 70%);
            filter: blur(28px);
            pointer-events: none;
            z-index: 0;
        }

        .screen {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Hero ── */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
        }

        .owl {
            width: 160px;
            height: 160px;
            object-fit: contain;
            animation: fadeUp 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1.15;
            text-align: center;
            animation: fadeUp 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s both;
        }

        .title .gold {
            color: #d4a574;
        }

        .subtitle {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.38);
            text-align: center;
            line-height: 1.55;
            max-width: 280px;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            border-radius: 14px;
            padding: 20px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            animation: fadeUp 0.45s ease 0.15s both;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(212, 165, 116, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
            stroke: #d4a574;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        .card-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.30);
        }

        /* ── Primary button ── */
        .btn {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            border: none;
            background: #d4a574;
            box-shadow: 0 4px 20px rgba(212, 165, 116, 0.38);
            color: #0d0d0d;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            animation: fadeUp 0.45s ease 0.2s both;
            transition: opacity 0.15s ease, transform 0.12s ease;
        }

        .btn:active {
            opacity: 0.82;
            transform: scale(0.98);
        }

        /* ── Footer hint ── */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.20);
            text-align: center;
            line-height: 1.6;
            animation: fadeUp 0.4s ease 0.25s both;
        }

        /* ── Loading state ── */
        .state-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(212, 165, 116, 0.18);
            border-top-color: #d4a574;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        .spinner-label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }

        /* ── Light mode — mirrors LoginView light appearance ── */
        @media (prefers-color-scheme: light) {
            body {
                background: #f7f4f0;
                color: #1a1a1a;
            }

            body::before {
                background: radial-gradient(circle,
                        rgba(212, 165, 116, 0.20) 0%,
                        rgba(212, 165, 116, 0) 70%);
            }

            .title {
                color: #1a1a1a;
            }

            .subtitle {
                color: rgba(26, 26, 26, 0.40);
            }

            .card {
                background: #ffffff;
                border-color: rgba(0, 0, 0, 0.08);
            }

            .card-label {
                color: rgba(26, 26, 26, 0.85);
            }

            .card-hint {
                color: rgba(26, 26, 26, 0.38);
            }

            .footer {
                color: rgba(26, 26, 26, 0.28);
            }

            .footer strong {
                color: rgba(26, 26, 26, 0.42);
            }

            .spinner-label {
                color: rgba(26, 26, 26, 0.42);
            }

            .spinner {
                border-color: rgba(212, 165, 116, 0.20);
                border-top-color: #d4a574;
            }
        }

    </style>
</head>

<body>

    <!-- Mobile: shown while attempting to open the app -->
    <div class="state-loading hidden" id="stateLoading">
        <div class="spinner"></div>
        <span class="spinner-label">Opening WealthTracker…</span>
    </div>

    <!-- Default: hero + action card (desktop always, mobile fallback) -->
    <div class="screen" id="stateReady">

        <div class="hero">
            <img class="owl" src="owl.png" alt="" role="presentation" />
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                <div class="title" id="title">
                    Account <span class="gold">confirmed</span>
                </div>
                <div class="subtitle" id="subtitle">
                    Your email has been verified.<br>Open the WealthTracker app to get started.
                </div>
            </div>
        </div>

        <!-- Info card -->
        <div class="card" id="card">
            <div class="card-icon" id="cardIcon">
                <svg id="iconCheck" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                <svg id="iconKey" viewBox="0 0 24 24" class="hidden">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                </svg>
            </div>
            <div class="card-text">
                <span class="card-label" id="cardLabel">Email verified</span>
                <span class="card-hint" id="cardHint">You can now sign in to your account</span>
            </div>
        </div>

        <!-- Only shown on mobile as a manual fallback -->
        <a class="btn hidden" id="btnOpenApp" href="#">Open WealthTracker</a>

        <p class="footer" id="footer">
            Don't have the app yet?<br>Search <strong>WealthTracker</strong> on the App Store.
        </p>

    </div>

    <script>
        (function() {
            var hash = window.location.hash;
            var params = new URLSearchParams(hash.replace(/^#/, ''));
            var type = (params.get('type') || '').toLowerCase();

            var title = document.getElementById('title');
            var subtitle = document.getElementById('subtitle');
            var cardLabel = document.getElementById('cardLabel');
            var cardHint = document.getElementById('cardHint');
            var iconCheck = document.getElementById('iconCheck');
            var iconKey = document.getElementById('iconKey');

            if (type === 'recovery') {
                title.innerHTML = 'Password <span class="gold">reset</span>';
                subtitle.innerHTML = 'Your reset link is verified.<br>Open the WealthTracker app to set your new password.';
                cardLabel.textContent = 'Ready to reset';
                cardHint.textContent = 'Continue inside the app to choose a new password';
                iconCheck.classList.add('hidden');
                iconKey.classList.remove('hidden');
            }

            var isMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile) {
                var stateLoading = document.getElementById('stateLoading');
                var stateReady = document.getElementById('stateReady');
                var btnOpenApp = document.getElementById('btnOpenApp');

                stateReady.classList.add('hidden');
                stateLoading.classList.remove('hidden');

                var appUrl = 'wealthtracker://auth/callback' + hash;
                window.location.href = appUrl;

                setTimeout(function() {
                    stateLoading.classList.add('hidden');
                    stateReady.classList.remove('hidden');
                    btnOpenApp.href = appUrl;
                    btnOpenApp.classList.remove('hidden');
                }, 1800);
            }
        })();

    </script>

</body>

</html>
