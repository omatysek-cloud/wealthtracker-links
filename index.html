<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WealthTracker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
            padding: 24px;
        }

        .card {
            text-align: center;
            max-width: 360px;
            width: 100%;
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon svg {
            width: 34px;
            height: 34px;
            stroke: #d4af37;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.2px;
            margin-bottom: 12px;
        }

        h1 span {
            color: #d4af37;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.45);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.10);
            margin: 28px auto;
        }

        .hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.28);
        }

        /* Loading state (shown briefly on mobile before redirect) */
        .loading .card {
            display: none;
        }

        .loading-indicator {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 15px;
        }

        .loading .loading-indicator {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

    </style>
</head>

<body>
    <div class="loading-indicator">
        <div class="spinner"></div>
        <span>Opening WealthTracker…</span>
    </div>

    <div class="card">
        <div class="icon">
            <!-- Checkmark -->
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
            </svg>
        </div>
        <h1 id="title">You're all <span>set</span></h1>
        <p id="message">Open the WealthTracker app on your iPhone to continue.</p>
        <div class="divider"></div>
        <p class="hint">This page is only a redirect helper.<br>All actions take place inside the app.</p>
    </div>

    <script>
        (function() {
            // Supabase appends tokens in the URL hash: #access_token=…&type=recovery&…
            var hash = window.location.hash;
            var params = new URLSearchParams(hash.replace(/^#/, ''));
            var type = params.get('type'); // "recovery" | "signup" | "magiclink"

            // Customise the desktop message based on flow type
            var title = document.getElementById('title');
            var message = document.getElementById('message');

            if (type === 'recovery') {
                title.innerHTML = 'Password <span>reset</span>';
                message.textContent = 'Open the WealthTracker app on your iPhone to set your new password.';
            } else {
                title.innerHTML = 'Account <span>confirmed</span>';
                message.textContent = 'Your email is verified. Open the WealthTracker app to get started.';
            }

            // Detect mobile (iOS only — this is an iPhone app)
            var isMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile) {
                // Show spinner while we attempt to open the app
                document.body.classList.add('loading');

                // Hand the full fragment through to the app unchanged
                var appUrl = 'wealthtracker://auth/callback' + hash;
                window.location.href = appUrl;

                // If the app didn't open within 1.8s (not installed / scheme blocked),
                // fall back to the desktop success card
                setTimeout(function() {
                    document.body.classList.remove('loading');
                }, 1800);
            }
            // On desktop: card is visible immediately, no redirect attempted
        })();

    </script>
</body>

</html>
